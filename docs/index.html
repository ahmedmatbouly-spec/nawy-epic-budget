<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Epic Budget Monitor — Nawy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-1: #1a2b4d;
    --bg-2: #1a3f57;
    --bg-3: #16524e;
    --accent: #2fdbc4;
    --ink: #ffffff;
    --muted: #a7b7cf;
    --muted-dim: #7f93b0;
    --card-bg: rgba(255,255,255,0.06);
    --card-bg-hover: rgba(255,255,255,0.10);
    --card-border: rgba(255,255,255,0.14);
    --card-selected-bg: #ffffff;
    --card-selected-ink: #182a4d;
    --clay: #f0653c;
    --line: rgba(255,255,255,0.14);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
    background-attachment: fixed;
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }
  #root { padding: 40px 24px 70px; max-width: 1160px; margin: 0 auto; }

  .header-row { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .logo-mark { width: 52px; height: 52px; border-radius: 14px; background: #ffffff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 18px rgba(0,0,0,0.25); }
  .eyebrow { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 3px; }
  .header-title { font-size: 18px; font-weight: 700; color: var(--ink); }

  h1 { font-size: 44px; margin: 0 0 14px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; }
  h1 .accent { color: var(--accent); }
  .subhead { color: var(--muted); font-size: 15px; margin-bottom: 18px; max-width: 640px; line-height: 1.6; }

  .status-row { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; box-shadow: 0 0 8px var(--accent); }
  .status-dot.warn { background: #f0a93b; box-shadow: 0 0 8px #f0a93b; }
  .status-pill { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 100px; background: var(--card-bg); border: 1px solid var(--card-border); color: var(--ink); }

  .glass-panel { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }

  .toolbar { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; margin-bottom: 24px; padding: 18px 20px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 600; }
  .field input, .field select { font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 8px 10px; border: 1px solid var(--card-border); border-radius: 8px; background: rgba(255,255,255,0.08); color: var(--ink); width: 150px; }
  .field select { font-family: 'Inter', sans-serif; cursor: pointer; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field input::-webkit-outer-spin-button, .field input::-webkit-inner-spin-button { opacity: 0.6; }

  button { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; padding: 10px 18px; border-radius: 8px; border: 1px solid var(--accent); background: var(--accent); color: #0d1f2e; cursor: pointer; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button.ghost { background: transparent; color: var(--ink); border-color: var(--card-border); }
  button.ghost:hover { background: var(--card-bg-hover); opacity: 1; }
  button.danger { border-color: var(--clay); color: var(--clay); background: transparent; }
  button.danger:hover { background: rgba(240,101,60,0.12); opacity: 1; }

  textarea { width: 100%; min-height: 90px; font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 12px; border-radius: 10px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.06); color: var(--ink); resize: vertical; }
  textarea::placeholder { color: var(--muted-dim); }

  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-bottom: 26px; }
  .kpi { padding: 18px 20px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
  .kpi .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .kpi .value { font-family: 'JetBrains Mono', monospace; font-size: 27px; font-weight: 600; line-height: 1.1; color: var(--ink); }
  .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .kpi.highlight .value { color: var(--accent); }
  .kpi.spend .value { color: #f0a93b; }

  .progress-bar { height: 7px; border-radius: 4px; background: rgba(255,255,255,0.12); overflow: hidden; margin-top: 8px; }
  .progress-bar > div { height: 100%; background: var(--accent); }

  .portfolio-banner { padding: 20px 22px; margin-bottom: 22px; border: 1px solid rgba(47,219,196,0.35); background: linear-gradient(120deg, rgba(47,219,196,0.12), rgba(255,255,255,0.05)); }
  .portfolio-banner .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
  .portfolio-banner .value { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; color: var(--ink); }
  .portfolio-banner .sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  table { width: 100%; border-collapse: collapse; border-radius: 14px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--card-border); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
  thead th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; padding: 12px 14px; border-bottom: 1px solid var(--card-border); background: rgba(255,255,255,0.04); cursor: pointer; user-select: none; }
  thead th:hover { color: var(--ink); }
  tbody td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.07); vertical-align: top; color: var(--ink); }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.045); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .num { text-align: right; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 9px; border-radius: 100px; }
  .badge.done { background: rgba(47,219,196,0.16); color: var(--accent); }
  .badge.progress { background: rgba(240,169,59,0.16); color: #f0a93b; }

  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin: 30px 0 12px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }

  .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .project-card { padding: 14px 18px; cursor: pointer; transition: background 0.15s, transform 0.1s; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
  .project-card:hover { background: var(--card-bg-hover); }
  .project-card .dot-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .project-card .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .project-card .pname { font-weight: 700; font-size: 14px; color: var(--ink); }
  .project-card .pcount { font-size: 12px; color: var(--muted); margin-left: 20px; }
  .project-card.active { background: var(--card-selected-bg); }
  .project-card.active .pname { color: var(--card-selected-ink); }
  .project-card.active .pcount { color: #5c6b85; }

  .epic-select-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .epic-select-row label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 600; }
  select.epic-select { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 14px; border: 1px solid var(--card-border); border-radius: 8px; background: rgba(255,255,255,0.08); color: var(--ink); min-width: 340px; cursor: pointer; }
  select.epic-select:focus { outline: none; border-color: var(--accent); }
  select.epic-select option { background: #16233f; color: #fff; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; border: 1px dashed var(--card-border); border-radius: 14px; }
  .helptext { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .helptext code, .subhead code { background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
  .error-msg { color: var(--clay); font-size: 12px; margin-top: 6px; }
  select#yearFilter option, select#quarterFilter option { background: #16233f; color: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ---------------------------------------------------------------------------
// Data loading: this page is served from the same repo/site as data/*.json
// (written automatically by the GitHub Action), so it fetches those files
// directly - no manual paste needed in normal operation. localStorage is
// kept only as an offline/manual-override fallback.
// ---------------------------------------------------------------------------
const STORE_KEY = 'nawy_epic_budget_data_v1';

function loadAllEpics() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveAllEpics(epics) {
  localStorage.setItem(STORE_KEY, JSON.stringify(epics));
}

async function fetchLiveEpics() {
  // data/index.json is written by scripts/jira_epic_budget.py on each run.
  // NOTE: GitHub Pages only publishes the docs/ folder, so data/ (a sibling
  // folder) isn't reachable via a relative path from here - we fetch it
  // straight from the repo's raw content instead.
  const RAW_BASE = 'https://raw.githubusercontent.com/ahmedmatbouly-spec/nawy-epic-budget/main/data';
  const cacheBust = `?_=${Date.now()}`;
  try {
    const idxResp = await fetch(`${RAW_BASE}/index.json${cacheBust}`, { cache: 'no-store' });
    if (!idxResp.ok) return { epics: {}, updatedAt: null };
    const idx = await idxResp.json();
    const results = {};
    await Promise.all((idx.epics || []).map(async (e) => {
      try {
        const r = await fetch(`${RAW_BASE}/${e.epic_key}.json${cacheBust}`, { cache: 'no-store' });
        if (r.ok) results[e.epic_key] = await r.json();
      } catch (err) { /* skip */ }
    }));
    return { epics: results, updatedAt: idx.updated_at || null };
  } catch (e) {
    return { epics: {}, updatedAt: null };
  }
}

// ---------------------------------------------------------------------------
// Live "Refresh from Jira" button.
//
// This calls a small Cloudflare Worker proxy instead of GitHub directly - the
// Worker holds the real GitHub token server-side (as a Cloudflare secret),
// so NOTHING sensitive is ever present in this page or the repo. See
// cloudflare-worker/worker.js for the proxy source and setup steps.
//
// Fill in WORKER_URL once you've deployed the Worker (see README).
// ---------------------------------------------------------------------------
const WORKER_URL = 'https://nawy-epic-budget.ahmed-matbouly.workers.dev';

async function fetchFreshIndexViaWorker() {
  // Used specifically right after a refresh completes, where we need a
  // genuinely fresh answer - raw.githubusercontent.com is unusable for this
  // (confirmed: Fastly caches by path only, ignoring cache-busting query
  // strings entirely), so this goes through the Worker's Contents-API proxy
  // instead, which is immune to that.
  try {
    const resp = await fetch(`${WORKER_URL}/data/index.json`, { cache: 'no-store' });
    if (!resp.ok) return null;
    return await resp.json();
  } catch (e) {
    return null;
  }
}

async function fetchFreshEpicViaWorker(epicKey) {
  try {
    const resp = await fetch(`${WORKER_URL}/data/${epicKey}.json`, { cache: 'no-store' });
    if (!resp.ok) return null;
    return await resp.json();
  } catch (e) {
    return null;
  }
}

function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

async function workerApi(path, opts) {
  return fetch(`${WORKER_URL}${path}`, opts);
}

async function getLatestRun() {
  try {
    const resp = await workerApi('/latest-run');
    if (!resp.ok) return null;
    const data = await resp.json();
    return data.id ? { id: data.id, status: data.status, conclusion: data.conclusion } : null;
  } catch (e) {
    return null;
  }
}

async function triggerJiraRefresh() {
  if (refreshState === 'running') return;

  if (!WORKER_URL || WORKER_URL.includes('YOUR-WORKER-SUBDOMAIN')) {
    refreshState = 'error';
    refreshStatusText = '✗ Refresh isn\'t set up yet — deploy the Cloudflare Worker and set WORKER_URL (see README)';
    render();
    return;
  }

  refreshState = 'running';
  refreshStatusText = 'Starting refresh…';
  render();

  try {
    const existing = await getLatestRun();
    const alreadyRunning = existing && (existing.status === 'queued' || existing.status === 'in_progress');

    let newRunId;
    if (alreadyRunning) {
      // Don't pile another dispatch onto the queue - a refresh is already
      // in flight (possibly from someone else, or a very recent click) -
      // just wait for that one instead of adding to the backlog.
      newRunId = existing.id;
      refreshStatusText = 'A refresh is already in progress — waiting for it…';
      render();
    } else {
      const baselineId = existing ? existing.id : null;
      const dispatchResp = await workerApi('/dispatch', { method: 'POST' });

      if (!dispatchResp.ok) {
        refreshState = 'error';
        refreshStatusText = '✗ Could not start refresh (check the Worker & Actions tab)';
        render();
        return;
      }

      refreshStatusText = 'Refresh queued, waiting for it to start…';
      render();

      // Poll for a NEW run to appear (GitHub takes a few seconds to register a dispatch)
      newRunId = null;
      for (let i = 0; i < 15; i++) {
        await sleep(2000);
        const latest = await getLatestRun();
        if (latest && latest.id !== baselineId) { newRunId = latest.id; break; }
      }
    }

    if (!newRunId) {
      refreshState = 'error';
      refreshStatusText = '✗ Refresh didn\'t start in time — check the Actions tab';
      render();
      return;
    }

    // Poll the new run until it completes (typical incremental run: 15-60s)
    refreshStatusText = 'Refreshing from Jira…';
    render();
    let finalConclusion = null;
    for (let i = 0; i < 60; i++) {
      await sleep(3000);
      try {
        const runResp = await workerApi(`/run/${newRunId}`);
        if (runResp.ok) {
          const run = await runResp.json();
          if (run.status === 'completed') { finalConclusion = run.conclusion; break; }
        }
      } catch (e) { /* keep polling */ }
    }

    if (finalConclusion === 'success') {
      refreshState = 'done';
      refreshStatusText = '✓ Refreshed — reloading data…';
      render();

      // Use the Worker's Contents-API proxy here specifically, NOT
      // raw.githubusercontent.com - that's fronted by Fastly, which caches
      // by URL path only and ignores cache-busting query strings entirely
      // (confirmed via direct testing: x-cache HIT regardless of query
      // string). This was the actual root cause of timestamps appearing
      // stale after a genuinely successful refresh.
      const previousTimestamp = lastUpdatedAt;
      let freshIndex = null, advanced = false;
      for (let i = 0; i < 10; i++) {
        freshIndex = await fetchFreshIndexViaWorker();
        if (freshIndex && freshIndex.updated_at && freshIndex.updated_at !== previousTimestamp) {
          advanced = true;
          break;
        }
        await sleep(2000);
      }

      if (freshIndex) {
        // Merge fresh summary fields (cost/days/completion) into every epic
        // immediately. Per-ticket ticket-level detail for the currently
        // active epic gets a fully fresh fetch too; other epics' detailed
        // ticket lists catch up via the normal (slightly-lagged, but
        // eventually-consistent) raw.githubusercontent.com path on next load.
        (freshIndex.epics || []).forEach(summary => {
          const key = summary.epic_key;
          epics[key] = { ...(epics[key] || {}), ...summary };
        });
        lastUpdatedAt = freshIndex.updated_at;
        liveDataStatus = 'live';

        if (activeEpic) {
          const freshActiveEpic = await fetchFreshEpicViaWorker(activeEpic);
          if (freshActiveEpic) {
            epics[activeEpic] = { ...epics[activeEpic], ...freshActiveEpic };
          }
        }
      }

      if (advanced) {
        refreshStatusText = '✓ Refreshed successfully';
      } else {
        refreshState = 'error';
        refreshStatusText = '⚠ Workflow completed, but data didn\'t change in time - GitHub may be lagging, try again shortly';
      }
      render();
      setTimeout(() => { refreshState = 'idle'; refreshStatusText = ''; render(); }, 6000);
    } else if (finalConclusion) {
      refreshState = 'error';
      refreshStatusText = `✗ Refresh run finished with: ${finalConclusion}`;
      render();
    } else {
      // Timed out after 3 minutes. Distinguish "genuinely stuck" from
      // "queued behind a long run" (e.g. the weekly Sunday full rebuild
      // re-scans all 300+ epics and takes ~20-30 minutes; a refresh clicked
      // during that window queues behind it - by design, not a failure).
      let stillGoing = false;
      try {
        const r = await workerApi(`/run/${newRunId}`);
        if (r.ok) {
          const run = await r.json();
          stillGoing = run.status === 'in_progress' || run.status === 'queued';
        }
      } catch (e) { /* fall through */ }
      if (stillGoing) {
        refreshState = 'error';
        refreshStatusText = '⏳ Still syncing — a full rebuild is likely running (~20-30 min). Your data will update automatically when it finishes; no need to click again.';
      } else {
        refreshState = 'error';
        refreshStatusText = '✗ Refresh is taking longer than expected — check the Actions tab';
      }
      render();
    }
  } catch (e) {
    refreshState = 'error';
    refreshStatusText = '✗ Refresh failed: ' + e.message;
    render();
  }
}

function formatEGP(n) {
  return new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 }).format(n) + ' EGP';
}
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s == null ? '' : String(s);
  return div.innerHTML;
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let epics = loadAllEpics();
let activeEpic = Object.keys(epics)[0] || null;
let activeProject = activeEpic ? (epics[activeEpic].project_name || epics[activeEpic].project_key) : null;
let rate = activeEpic ? (epics[activeEpic].rate_per_day_egp || 3500) : 3500;
let filterYear = 'all';
let filterQuarter = 'all';
let sortCol = 'net_days';
let sortDir = -1;
let liveDataStatus = 'loading'; // 'loading' | 'live' | 'none'
let lastUpdatedAt = null;
let refreshState = 'idle'; // 'idle' | 'running' | 'done' | 'error'
let refreshStatusText = '';

async function initLiveData() {
  const { epics: live, updatedAt } = await fetchLiveEpics();
  if (Object.keys(live).length > 0) {
    epics = { ...epics, ...live }; // live pipeline data wins over stale local copies
    liveDataStatus = 'live';
    lastUpdatedAt = updatedAt;
    if (!activeEpic || live[activeEpic]) {
      activeEpic = Object.keys(live)[0];
      rate = live[activeEpic].rate_per_day_egp || rate;
    }
    activeProject = epics[activeEpic] ? (epics[activeEpic].project_name || epics[activeEpic].project_key) : null;
  } else {
    liveDataStatus = 'none';
  }
  render();
}

const PROJECT_DOT_COLORS = ['#2fdbc4', '#f0653c', '#9b6bf2', '#3fb6f0', '#f0a93b', '#2bc47a', '#ec6ba6', '#e6555a', '#7c8fb5'];
function projectDotColor(projectName) {
  let hash = 0;
  for (let i = 0; i < projectName.length; i++) hash = (hash * 31 + projectName.charCodeAt(i)) >>> 0;
  return PROJECT_DOT_COLORS[hash % PROJECT_DOT_COLORS.length];
}

function epicMatchesFilter(epic) {
  if (filterYear === 'all' && filterQuarter === 'all') return true;
  if (!epic.epic_created) return false; // no date on record - exclude when a filter is active
  const d = new Date(epic.epic_created);
  if (isNaN(d.getTime())) return false;
  const y = d.getFullYear();
  const month = d.getMonth(); // 0-11
  if (filterYear !== 'all' && String(y) !== filterYear) return false;
  if (filterQuarter !== 'all') {
    const q = Math.floor(month / 3) + 1; // 1-4
    if (`Q${q}` !== filterQuarter) return false;
  }
  return true;
}

function render() {
  const root = document.getElementById('root');
  // Apply the year/quarter filter first - everything downstream (tabs, dropdown,
  // portfolio totals) only considers epics that pass it.
  const filteredKeys = Object.keys(epics).filter(k => epicMatchesFilter(epics[k]));

  const portfolioDays = filteredKeys.reduce((s, k) => s + (epics[k].total_net_days || 0), 0);
  const portfolioCost = portfolioDays * rate;

  // Group (filtered) epics by project
  const projectsMap = {}; // project_name -> [ {key, epic_name}, ... ]
  filteredKeys.forEach(k => {
    const e = epics[k];
    const pName = e.project_name || e.project_key || k.split('-')[0];
    if (!projectsMap[pName]) projectsMap[pName] = [];
    projectsMap[pName].push({ key: k, name: e.epic_name || k });
  });
  const projectNames = Object.keys(projectsMap).sort();
  if (!activeProject || !projectsMap[activeProject]) activeProject = projectNames[0] || null;
  if (!activeProject) {
    activeEpic = null;
  } else if (!activeEpic || !projectsMap[activeProject].some(e => e.key === activeEpic)) {
    // If the active epic got filtered out, fall back to the top epic in the active project
    const opts = projectsMap[activeProject].slice().sort((a, b) => (epics[b.key].total_cost_egp || 0) - (epics[a.key].total_cost_egp || 0));
    activeEpic = opts.length ? opts[0].key : null;
    if (activeEpic) rate = epics[activeEpic].rate_per_day_egp || rate;
  }

  const current = activeEpic ? epics[activeEpic] : null;
  const tickets = current ? (current.tickets || []) : [];

  const totalDays = tickets.reduce((s, t) => s + (t.net_days || 0), 0);
  const totalCost = totalDays * rate;
  const complete = tickets.filter(t => t.is_complete).length;
  const inProgress = tickets.length - complete;
  const avgDays = tickets.length ? totalDays / tickets.length : 0;

  const tabs = projectNames.map(p =>
    `<div class="project-card${p === activeProject ? ' active' : ''}" data-project="${escapeHtml(p)}">
       <div class="dot-row"><span class="dot" style="background:${projectDotColor(p)}"></span><span class="pname">${escapeHtml(p)}</span></div>
       <div class="pcount">${projectsMap[p].length} epic${projectsMap[p].length === 1 ? '' : 's'}</div>
     </div>`
  ).join('');

  const epicOptions = activeProject && projectsMap[activeProject] ? projectsMap[activeProject]
    .slice()
    .sort((a, b) => (epics[b.key].total_cost_egp || 0) - (epics[a.key].total_cost_egp || 0))
    .map(e => `<option value="${escapeHtml(e.key)}" ${e.key === activeEpic ? 'selected' : ''}>${escapeHtml(e.key)} — ${escapeHtml(e.name)}</option>`)
    .join('') : '';

  let tableRows = '';
  if (current) {
    const sorted = tickets.slice().sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (typeof av === 'string') { av = (av || '').toLowerCase(); bv = (bv || '').toLowerCase(); }
      if (av < bv) return -1 * sortDir;
      if (av > bv) return 1 * sortDir;
      return 0;
    });
    tableRows = sorted.map(t => `
      <tr>
        <td class="mono">${escapeHtml(t.key)}</td>
        <td>${escapeHtml(t.summary)}</td>
        <td>${escapeHtml(t.status)}</td>
        <td class="mono num">${(t.net_days || 0).toFixed(2)}</td>
        <td class="mono num">${formatEGP((t.net_days || 0) * rate)}</td>
        <td><span class="badge ${t.is_complete ? 'done' : 'progress'}">${t.is_complete ? 'Done' : 'In progress'}</span></td>
      </tr>
    `).join('');
  }

  root.innerHTML = `
    <div class="header-row">
      <div class="logo-mark">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 4 H26 V26 H4 Z" fill="none"/>
          <path d="M4 4 H15 V15 H4 Z" fill="#2fdbc4"/>
          <path d="M15 15 H26 V26 H15 Z" fill="#f0653c"/>
          <path d="M15 4 H26 V15 H15 Z" fill="#182a4d"/>
          <circle cx="9.5" cy="9.5" r="2.6" fill="#182a4d"/>
        </svg>
      </div>
      <div>
        <div class="eyebrow">Nawy · Engineering</div>
        <div class="header-title">Epic Budget Monitor</div>
      </div>
    </div>

    <h1>Epic Budget <span class="accent">Monitor</span></h1>
    <div class="subhead">Net business-days consumed and cost per Epic — synced automatically from Jira across every squad.</div>

    <div class="status-row">
      ${liveDataStatus === 'live'
        ? `<span class="status-dot"></span> Live from Jira · updated ${lastUpdatedAt ? new Date(lastUpdatedAt).toLocaleString() : 'recently'}`
        : liveDataStatus === 'loading'
          ? `<span class="status-dot warn"></span> Checking for live data...`
          : `<span class="status-dot warn"></span> No live data found yet — run the Action once, or paste JSON manually below`
      }
      <button class="ghost" id="refreshBtn" style="padding:7px 14px; font-size:12px;" ${refreshState === 'running' ? 'disabled' : ''}>
        ${refreshState === 'running' ? '⏳ Refreshing…' : '↻ Refresh from Jira'}
      </button>
      <span id="refreshStatusMsg" style="font-size:12px; color:${refreshState === 'error' ? '#f0653c' : 'var(--accent)'};">${refreshStatusText}</span>
    </div>

    <div class="toolbar">
      <div class="field">
        <label>Cost / business day</label>
        <input type="number" id="rateInput" value="${rate}">
      </div>
      <div class="field">
        <label>Year</label>
        <select id="yearFilter"></select>
      </div>
      <div class="field">
        <label>Quarter</label>
        <select id="quarterFilter">
          <option value="all">All</option>
          <option value="Q1">Q1 (Jan–Mar)</option>
          <option value="Q2">Q2 (Apr–Jun)</option>
          <option value="Q3">Q3 (Jul–Sep)</option>
          <option value="Q4">Q4 (Oct–Dec)</option>
        </select>
      </div>
      <div class="helptext" style="flex:1; align-self:center;">
        Rate defaults to 3,500 EGP/day. Year/Quarter filters by each epic's creation date — pick both for a specific quarter (e.g. Year=2026, Quarter=Q1), or either alone.
      </div>
    </div>

    ${(filterYear !== 'all' || filterQuarter !== 'all') ? `
      <div class="portfolio-banner">
        <div class="label">Portfolio total for ${escapeHtml(filterYear === 'all' ? 'all years' : filterYear)}${filterQuarter !== 'all' ? ' · ' + escapeHtml(filterQuarter) : ''}</div>
        <div class="value">${formatEGP(portfolioCost)}</div>
        <div class="sub">${portfolioDays.toFixed(1)} business days across ${filteredKeys.length} epic${filteredKeys.length === 1 ? '' : 's'}</div>
      </div>
    ` : ''}

    ${projectNames.length > 0 ? `<div class="project-grid">${tabs}</div>` : ''}
    ${activeProject ? `
      <div class="epic-select-row">
        <label>Epic</label>
        <select class="epic-select" id="epicSelect">${epicOptions}</select>
      </div>
    ` : (filteredKeys.length === 0 ? `<div class="empty">No epics match this time filter.</div>` : '')}

    ${current ? `
      <h2 style="font-size:18px; margin: 4px 0 12px; font-weight:700;">
        ${escapeHtml(current.epic_name && current.epic_name !== current.epic_key ? current.epic_name : current.epic_key)}
        <span class="mono" style="font-size:13px; color:var(--muted); font-weight:500;">(${escapeHtml(current.epic_key)})</span>
      </h2>
      <div class="kpi-row">
        <div class="kpi highlight">
          <div class="label">Business days consumed</div>
          <div class="value">${totalDays.toFixed(1)}</div>
          <div class="sub">across ${tickets.length} tickets</div>
        </div>
        <div class="kpi spend">
          <div class="label">Budget consumed so far</div>
          <div class="value">${formatEGP(totalCost)}</div>
          <div class="sub">@ ${formatEGP(rate)}/day</div>
        </div>
        <div class="kpi">
          <div class="label">Tickets complete</div>
          <div class="value">${complete}/${tickets.length}</div>
          <div class="progress-bar"><div style="width:${tickets.length ? (complete/tickets.length*100) : 0}%"></div></div>
        </div>
        <div class="kpi">
          <div class="label">Avg days / ticket</div>
          <div class="value">${avgDays.toFixed(1)}</div>
          <div class="sub">${inProgress} still in progress</div>
        </div>
      </div>

      <div class="section-title">Ticket breakdown — ${escapeHtml(current.epic_key)}${current.epic_name && current.epic_name !== current.epic_key ? ' · ' + escapeHtml(current.epic_name) : ''}</div>
      <table>
        <thead>
          <tr>
            <th data-col="key">Key</th>
            <th data-col="summary">Summary</th>
            <th data-col="status">Status</th>
            <th data-col="net_days" class="num">Net days</th>
            <th class="num">Cost</th>
            <th data-col="is_complete">State</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>

      <div style="margin-top:14px; display:flex; justify-content:space-between; align-items:center;">
        <div class="helptext">Generated ${current.generated_at ? new Date(current.generated_at).toLocaleString() : 'unknown'}</div>
        <button class="danger" id="removeEpicBtn">Remove this epic</button>
      </div>
    ` : `<div class="empty">No epic data loaded yet. Run <code>jira_epic_budget.py &lt;EPIC_KEY&gt;</code> and paste the generated JSON below.</div>`}

    <div class="section-title">Load / refresh an epic</div>
    <textarea id="pasteArea" placeholder="Paste the contents of epic_budget_&lt;EPIC_KEY&gt;.json here..."></textarea>
    <div id="errorMsg" class="error-msg"></div>
    <div style="margin-top:10px; display:flex; gap:8px;">
      <button id="loadBtn">Load epic data</button>
      <button class="ghost" id="clearBtn">Clear</button>
    </div>
    <div class="helptext">
      Data persists in this browser between visits (localStorage). Re-run the script and re-paste anytime to refresh an epic's numbers — it overwrites the previous snapshot for that Epic key. Note: this storage is local to this browser only, so it won't sync across devices or browsers.
    </div>
  `;

  attachHandlers();
}

function attachHandlers() {
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', () => {
      triggerJiraRefresh();
    });
  }

  const rateInput = document.getElementById('rateInput');
  if (rateInput) {
    rateInput.addEventListener('input', () => {
      rate = parseFloat(rateInput.value) || 0;
      render();
      document.getElementById('rateInput').focus();
    });
  }

  const yearFilter = document.getElementById('yearFilter');
  if (yearFilter) {
    // Populate available years from the data (once per render is cheap enough here)
    const years = new Set();
    Object.values(epics).forEach(e => {
      if (e.epic_created) {
        const d = new Date(e.epic_created);
        if (!isNaN(d.getTime())) years.add(d.getFullYear());
      }
    });
    const sortedYears = Array.from(years).sort((a, b) => b - a);
    yearFilter.innerHTML = `<option value="all">All</option>` +
      sortedYears.map(y => `<option value="${y}" ${String(y) === filterYear ? 'selected' : ''}>${y}</option>`).join('');
    yearFilter.value = filterYear;
    yearFilter.addEventListener('change', () => {
      filterYear = yearFilter.value;
      render();
    });
  }

  const quarterFilter = document.getElementById('quarterFilter');
  if (quarterFilter) {
    quarterFilter.value = filterQuarter;
    quarterFilter.addEventListener('change', () => {
      filterQuarter = quarterFilter.value;
      render();
    });
  }

  document.querySelectorAll('.project-card').forEach(el => {
    el.addEventListener('click', () => {
      activeProject = el.getAttribute('data-project');
      // pick the highest-cost epic in this project (respecting the active time filter) by default
      const inProject = Object.keys(epics).filter(k =>
        epicMatchesFilter(epics[k]) &&
        (epics[k].project_name || epics[k].project_key || k.split('-')[0]) === activeProject
      );
      if (inProject.length) {
        inProject.sort((a, b) => (epics[b].total_cost_egp || 0) - (epics[a].total_cost_egp || 0));
        activeEpic = inProject[0];
        rate = epics[activeEpic].rate_per_day_egp || rate;
      }
      render();
    });
  });

  const epicSelect = document.getElementById('epicSelect');
  if (epicSelect) {
    epicSelect.addEventListener('change', () => {
      activeEpic = epicSelect.value;
      rate = epics[activeEpic].rate_per_day_egp || rate;
      render();
    });
  }

  document.querySelectorAll('thead th[data-col]').forEach(el => {
    el.addEventListener('click', () => {
      const col = el.getAttribute('data-col');
      if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
      render();
    });
  });

  const loadBtn = document.getElementById('loadBtn');
  if (loadBtn) {
    loadBtn.addEventListener('click', () => {
      const val = document.getElementById('pasteArea').value;
      const errEl = document.getElementById('errorMsg');
      errEl.textContent = '';
      try {
        const parsed = JSON.parse(val);
        if (!parsed.epic_key || !parsed.tickets) {
          errEl.textContent = 'JSON must contain "epic_key" and "tickets" fields (output of jira_epic_budget.py)';
          return;
        }
        epics[parsed.epic_key] = parsed;
        saveAllEpics(epics);
        activeEpic = parsed.epic_key;
        rate = parsed.rate_per_day_egp || rate;
        render();
      } catch (e) {
        errEl.textContent = 'Could not parse JSON: ' + e.message;
      }
    });
  }

  const clearBtn = document.getElementById('clearBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      document.getElementById('pasteArea').value = '';
    });
  }

  const removeBtn = document.getElementById('removeEpicBtn');
  if (removeBtn) {
    removeBtn.addEventListener('click', () => {
      delete epics[activeEpic];
      saveAllEpics(epics);
      activeEpic = Object.keys(epics)[0] || null;
      render();
    });
  }
}

render();
initLiveData();
</script>
</body>
</html>
