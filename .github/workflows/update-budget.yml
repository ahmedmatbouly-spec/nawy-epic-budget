name: Update Epic Budget Data

on:
  schedule:
    # Daily incremental sync at 06:00 UTC (08:00 Cairo) - fast, only pulls what changed.
    - cron: '0 6 * * *'
    # Weekly FULL rebuild, Sunday 03:00 UTC - safety net to catch anything an
    # incremental sync can miss (e.g. a ticket moved to a totally different
    # epic without either epic showing up as "updated" in a way we scoped for).
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      full:
        description: 'Force a full rebuild instead of incremental sync'
        type: boolean
        default: false

permissions:
  contents: write

# Prevents the race condition that was silently dropping data: if a new run
# starts while a previous one is still in progress (e.g. rapid refresh-button
# clicks), queue it instead of running both at once and racing on the git push.
concurrency:
  group: update-budget-data
  cancel-in-progress: false

jobs:
  update-budget-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine sync mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.full }}" == "true" ]; then
            echo "flag=--full" >> "$GITHUB_OUTPUT"
            echo "Mode: FULL (manually requested)"
          elif [ "${{ github.event.schedule }}" == "0 3 * * 0" ]; then
            echo "flag=--full" >> "$GITHUB_OUTPUT"
            echo "Mode: FULL (weekly scheduled rebuild)"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "Mode: INCREMENTAL"
          fi

      - name: Run Jira budget fetch
        env:
          JIRA_SITE: ${{ secrets.JIRA_SITE }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          RATE_PER_DAY_EGP: ${{ vars.RATE_PER_DAY_EGP || '3500' }}
        run: |
          mkdir -p debug
          set +e
          python scripts/jira_epic_budget.py ${{ steps.mode.outputs.flag }} > debug/last_run.log 2>&1
          CODE=$?
          set -e
          echo "SCRIPT_EXIT_CODE=$CODE" >> debug/last_run.log
          cat debug/last_run.log
          if [ $CODE -ne 0 ]; then
            ERRMSG=$(tail -c 800 debug/last_run.log | tr '\n' ' ' | tr '"' "'")
            echo "::error::Script failed (exit $CODE): $ERRMSG"
          fi
          exit $CODE

      - name: Commit debug log (always, even on failure)
        if: always()
        run: |
          git config user.name "epic-budget-bot"
          git config user.email "actions@github.com"
          git add debug/ data/ 2>/dev/null || true
          if git diff --quiet --cached; then
            echo "::warning::Nothing to commit (debug/data unchanged)"
            exit 0
          fi
          git commit -m "Update budget data + debug log [automated]"

          # Retry-with-rebase in case another run's push landed in between
          # (concurrency: group above should prevent this, but this is defense
          # in depth). Fails the job for real if it still can't push, rather
          # than silently swallowing it - this is what was previously masking
          # data loss during a push race.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed successfully (attempt $attempt)."
              exit 0
            fi
            echo "Push failed (attempt $attempt), pulling + rebasing and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 3))
          done

          echo "::error::git push failed after 5 attempts - data from this run was NOT saved. Check repo permissions or investigate concurrent-run conflicts."
          exit 1
