name: Update Epic Budget Data

on:
  schedule:
    # Runs daily at 06:00 UTC (08:00 Cairo time). Adjust as needed.
    - cron: '0 6 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-budget-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Jira budget fetch
        env:
          JIRA_SITE: ${{ secrets.JIRA_SITE }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          RATE_PER_DAY_EGP: ${{ vars.RATE_PER_DAY_EGP || '3500' }}
        run: |
          mkdir -p debug
          python scripts/jira_epic_budget.py > debug/last_run.log 2>&1
          echo "SCRIPT_EXIT_CODE=$?" >> debug/last_run.log
          cat debug/last_run.log

      - name: Commit debug log (always, even on failure)
        if: always()
        run: |
          git config user.name "epic-budget-bot"
          git config user.email "actions@github.com"
          git add debug/ data/ 2>/dev/null || true
          git diff --quiet --cached || git commit -m "Update budget data + debug log [automated]"
          git push || true
