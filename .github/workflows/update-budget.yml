name: Update Epic Budget Data

on:
  schedule:
    # Daily incremental sync at 06:00 UTC (08:00 Cairo) - fast, only pulls what changed.
    - cron: '0 6 * * *'
    # Weekly FULL rebuild, Sunday 03:00 UTC - safety net to catch anything an
    # incremental sync can miss (e.g. a ticket moved to a totally different
    # epic without either epic showing up as "updated" in a way we scoped for).
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      full:
        description: 'Force a full rebuild instead of incremental sync'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-budget-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine sync mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.full }}" == "true" ]; then
            echo "flag=--full" >> "$GITHUB_OUTPUT"
            echo "Mode: FULL (manually requested)"
          elif [ "${{ github.event.schedule }}" == "0 3 * * 0" ]; then
            echo "flag=--full" >> "$GITHUB_OUTPUT"
            echo "Mode: FULL (weekly scheduled rebuild)"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "Mode: INCREMENTAL"
          fi

      - name: Run Jira budget fetch
        env:
          JIRA_SITE: ${{ secrets.JIRA_SITE }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          RATE_PER_DAY_EGP: ${{ vars.RATE_PER_DAY_EGP || '3500' }}
        run: |
          mkdir -p debug
          set +e
          python scripts/jira_epic_budget.py ${{ steps.mode.outputs.flag }} > debug/last_run.log 2>&1
          CODE=$?
          set -e
          echo "SCRIPT_EXIT_CODE=$CODE" >> debug/last_run.log
          cat debug/last_run.log
          if [ $CODE -ne 0 ]; then
            ERRMSG=$(tail -c 800 debug/last_run.log | tr '\n' ' ' | tr '"' "'")
            echo "::error::Script failed (exit $CODE): $ERRMSG"
          fi
          exit $CODE

      - name: Commit debug log (always, even on failure)
        if: always()
        run: |
          git config user.name "epic-budget-bot"
          git config user.email "actions@github.com"
          git add debug/ data/ 2>/dev/null || true
          if git diff --quiet --cached; then
            echo "::warning::Nothing to commit (debug/data unchanged)"
          else
            git commit -m "Update budget data + debug log [automated]"
            if ! git push; then
              echo "::error::git push failed - check repo permissions (Settings > Actions > General > Workflow permissions)"
            fi
          fi
